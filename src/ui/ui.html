<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Inter, -apple-system, system-ui, sans-serif;
    font-size: 12px;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid #e6e6e6;
    flex-wrap: wrap;
  }
  header strong { font-size: 13px; }
  .segmented { display: inline-flex; background: #f0f1f4; border-radius: 8px; padding: 2px; }
  .segmented button {
    border: none;
    background: transparent;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: #555;
  }
  .segmented button.active {
    background: #fff;
    color: #3d4cff;
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
  }
  select { font-size: 12px; padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; }
  .tabs { margin-left: auto; }

  #templates-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-bottom: 1px solid #eee; background: #f4f6fb;
  }
  #templates-bar .label { font-weight: 700; font-size: 11px; color: #6b7280; }
  #template-name { flex: 1; border: 1px solid #e0e0e0; border-radius: 6px; padding: 5px 8px; font-size: 12px; }
  #templates-bar button { padding: 5px 10px; border: 1px solid #d7d9e0; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; }
  #template-add { background: #3d4cff; color: #fff; border-color: #3d4cff; font-weight: 600; }

  #settings { display: flex; gap: 8px; padding: 8px 12px; border-bottom: 1px solid #eee; background: #fafafa; }
  #settings input { border: 1px solid #e0e0e0; border-radius: 6px; padding: 5px 8px; font-size: 12px; }
  #subject { flex: 2; }
  #from { flex: 1; }

  /* New-variable row */
  .newvar { display: flex; gap: 6px; margin-bottom: 10px; }
  .newvar input { flex: 1; min-width: 0; border: 1px solid #e0e0e0; border-radius: 6px; padding: 6px 8px; font-size: 12px; }
  .newvar select { padding: 6px; }
  .newvar button { padding: 6px 10px; border: none; border-radius: 6px; background: #3d4cff; color: #fff; font-weight: 600; cursor: pointer; }
  .var-del { border: none; background: transparent; color: #b00020; cursor: pointer; font-size: 11px; float: right; }

  main { flex: 1; overflow: hidden; position: relative; }
  #workarea { display: flex; height: 100%; }

  /* Client (inbox) chrome */
  #client-view { flex: 1; overflow: auto; background: #f2f4f7; padding: 20px; }
  #mail-card {
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
    overflow: hidden;
  }
  #mail-subject { padding: 16px 20px 4px; font-size: 18px; font-weight: 600; color: #202124; }
  #mail-meta { display: flex; align-items: center; gap: 10px; padding: 8px 20px 14px; border-bottom: 1px solid #f0f0f0; }
  #avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: #1a56ff; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; flex-shrink: 0;
  }
  #mail-from { flex: 1; line-height: 1.4; }
  #mail-from .name { font-weight: 600; color: #202124; }
  #mail-from .addr, #mail-from .to { color: #5f6368; font-size: 11px; }
  #mail-date { color: #5f6368; font-size: 11px; white-space: nowrap; }
  #preview { width: 100%; border: none; display: block; background: #fff; }

  #client-view[data-client='apple'] #mail-card { max-width: 680px; }
  #client-view[data-client='outlook'] #mail-card { max-width: 600px; border-radius: 4px; }
  #client-view.dark { background: #1b1b1b; }
  #client-view.dark #mail-card { background: #2a2a2a; }
  #client-view.dark #mail-subject, #client-view.dark #mail-from .name { color: #e8eaed; }

  /* Variables panel */
  #panel { width: 280px; flex-shrink: 0; border-left: 1px solid #e6e6e6; overflow: auto; padding: 12px; background: #fff; }
  .panel-btn {
    width: 100%; padding: 8px; border: 1px solid #d7d9e0; border-radius: 8px;
    background: #f7f8fa; cursor: pointer; font-size: 12px; font-weight: 600;
  }
  .panel-note { color: #8a8f98; font-size: 11px; margin: 6px 0 12px; }
  .panel-section { border-top: 1px solid #eee; padding-top: 12px; margin-top: 12px; }
  .panel-title { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #6b7280; margin-bottom: 8px; }
  .muted { color: #8a8f98; font-size: 11px; }
  .field { margin-bottom: 8px; }
  .field label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 3px; }
  .field input {
    width: 100%; border: 1px solid #e0e0e0; border-radius: 6px; padding: 6px 8px; font-size: 12px;
  }
  .row-btns { display: flex; gap: 6px; }
  .row-btns button { flex: 1; padding: 6px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .bind { background: #3d4cff; color: #fff; }
  .unbind { background: #eef0f2; color: #333; }
  .var-item { padding: 6px 8px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 6px; }
  .var-item code { color: #3d4cff; font-weight: 600; }
  .var-item .meta { color: #8a8f98; font-size: 10px; }
  .kind-chip { display: inline-block; padding: 1px 6px; border-radius: 4px; background: #eef0ff; color: #3d4cff; font-size: 10px; font-weight: 600; margin-bottom: 6px; }

  #source {
    width: 100%; height: 100%; margin: 0; padding: 12px; border: none; resize: none;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px;
    white-space: pre; background: #1e1e1e; color: #d4d4d4;
  }
  .hidden { display: none !important; }

  footer { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #e6e6e6; }
  footer button { flex: 1; padding: 8px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .primary { background: #3d4cff; color: #fff; }
  .secondary { background: #eef0f2; color: #1a1a1a; }
  #status { padding: 8px 12px; color: #b00020; background: #fff4f4; font-size: 12px; }
  #resize {
    position: fixed; right: 0; bottom: 0; width: 16px; height: 16px; cursor: nwse-resize;
    background: linear-gradient(135deg, transparent 50%, #b8bcc4 50%); z-index: 10;
  }

  /* Onboarding / empty state */
  #onboarding {
    position: absolute; inset: 0; z-index: 20; background: #fff;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  #onboarding.hidden { display: none !important; }
  .ob-card { max-width: 380px; width: 100%; text-align: center; }
  .ob-card h2 { margin: 0 0 4px; font-size: 20px; }
  .ob-card .tagline { color: #8a8f98; margin: 0 0 18px; }
  .ob-card p { color: #444; margin: 14px 0 6px; font-size: 12px; }
  .ob-list { display: flex; flex-direction: column; gap: 6px; }
  .ob-open {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; border: 1px solid #e0e2e8; border-radius: 8px;
    background: #f7f8fa; cursor: pointer; font-size: 12px; font-weight: 600;
  }
  .ob-open:hover { border-color: #3d4cff; }
  .ob-create {
    width: 100%; padding: 11px; border: none; border-radius: 8px;
    background: #3d4cff; color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; margin-top: 4px;
  }
  .ob-hint { color: #8a8f98; font-size: 12px; margin-top: 8px; }
</style>

<header>
  <strong>Figmail</strong>
  <div class="segmented" id="mode">
    <button id="mode-image" class="active">Exact (image)</button>
    <button id="mode-text">Text (editable)</button>
  </div>
  <select id="client" title="Preview client">
    <option value="gmail">Gmail</option>
    <option value="apple">Apple Mail</option>
    <option value="outlook">Outlook</option>
  </select>
  <div class="segmented" id="theme">
    <button id="theme-light" class="active">Light</button>
    <button id="theme-dark">Dark</button>
  </div>
  <div class="segmented tabs">
    <button id="tab-preview" class="active">Preview</button>
    <button id="tab-source">HTML</button>
  </div>
</header>

<div id="templates-bar">
  <span class="label">Email</span>
  <select id="template-select" title="Switch template"></select>
  <input id="template-name" type="text" placeholder="Template name" />
  <button id="template-rename" title="Rename this template">Rename</button>
  <button id="template-delete" title="Remove from list">✕</button>
  <button id="template-add" title="Capture the selected Figma frame as a new template">＋ Capture</button>
</div>

<div id="settings">
  <input id="subject" type="text" placeholder="Subject" value="Your Haulla invoice" />
  <input id="from" type="text" placeholder="From (name &lt;email&gt;)" value="Haulla <no-reply@haulla.com>" />
</div>

<div id="status" class="hidden"></div>

<main>
  <div id="workarea">
    <div id="client-view" data-client="gmail">
      <div id="mail-card">
        <div id="mail-subject">Your Haulla invoice</div>
        <div id="mail-meta">
          <div id="avatar">H</div>
          <div id="mail-from">
            <div><span class="name">Haulla</span> <span class="addr">&lt;no-reply@haulla.com&gt;</span></div>
            <div class="to">to me</div>
          </div>
          <div id="mail-date">now</div>
        </div>
        <iframe id="preview"></iframe>
      </div>
    </div>

    <aside id="panel">
      <div class="panel-note">Use ＋ Capture (top) to save a frame, then bind variables to text / links / images (Text mode).</div>

      <div class="panel-section">
        <div class="panel-title">Preview values</div>
        <div class="segmented" id="varmode">
          <button id="var-mockup" class="active">Mockup</button>
          <button id="var-vars">Variables</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Selection</div>
        <div id="selection-body" class="muted">Select a text, button, or image layer in Figma.</div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Variables</div>
        <div class="newvar">
          <input id="newvar-name" type="text" placeholder="New variable name" />
          <select id="newvar-type">
            <option value="text">text</option>
            <option value="url">url</option>
            <option value="image">image</option>
          </select>
          <button id="newvar-add">Add</button>
        </div>
        <div id="variables-list" class="muted">None yet.</div>
      </div>
    </aside>
  </div>
  <textarea id="source" class="hidden" readonly></textarea>
  <div id="onboarding"></div>
</main>

<footer>
  <button id="copy" class="secondary">Copy HTML</button>
  <button id="download" class="primary">Export (.zip)</button>
</footer>

<div id="resize" title="Drag to resize"></div>

<script>/*__INLINE_JS__*/</script>
