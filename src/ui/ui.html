<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Inter, -apple-system, system-ui, sans-serif;
    font-size: 12px;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid #e6e6e6;
    flex-wrap: wrap;
  }
  header strong { font-size: 13px; }
  .segmented {
    display: inline-flex;
    background: #f0f1f4;
    border-radius: 8px;
    padding: 2px;
  }
  .segmented button {
    border: none;
    background: transparent;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: #555;
  }
  .segmented button.active {
    background: #fff;
    color: #3d4cff;
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
  }
  .tabs { margin-left: auto; }
  main { flex: 1; overflow: auto; position: relative; }
  #preview { width: 100%; height: 100%; border: none; background: #f5f5f5; }
  #source {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 12px;
    border: none;
    resize: none;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    white-space: pre;
    background: #1e1e1e;
    color: #d4d4d4;
  }
  .hidden { display: none !important; }
  footer {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid #e6e6e6;
  }
  footer button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }
  .primary { background: #3d4cff; color: #fff; }
  .secondary { background: #eef0f2; color: #1a1a1a; }
  #status {
    padding: 8px 12px;
    color: #b00020;
    background: #fff4f4;
    font-size: 12px;
  }
  #resize {
    position: fixed;
    right: 0;
    bottom: 0;
    width: 16px;
    height: 16px;
    cursor: nwse-resize;
    background: linear-gradient(135deg, transparent 50%, #b8bcc4 50%);
    z-index: 10;
  }
</style>

<header>
  <strong>Figmail</strong>
  <div class="segmented" id="mode">
    <button id="mode-image" class="active">Exact (image)</button>
    <button id="mode-text">Text (editable)</button>
  </div>
  <div class="segmented tabs">
    <button id="tab-preview" class="active">Preview</button>
    <button id="tab-source">HTML</button>
  </div>
</header>

<div id="status" class="hidden"></div>

<main>
  <iframe id="preview"></iframe>
  <textarea id="source" class="hidden" readonly></textarea>
</main>

<footer>
  <button id="copy" class="secondary">Copy HTML</button>
  <button id="download" class="primary">Export (.zip)</button>
</footer>

<div id="resize" title="Drag to resize"></div>

<script>/*__INLINE_JS__*/</script>
