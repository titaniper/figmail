<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Inter, -apple-system, system-ui, sans-serif;
    font-size: 12px;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid #e6e6e6;
  }
  header strong { font-size: 13px; }
  .tabs { display: flex; gap: 4px; margin-left: auto; }
  .tabs button {
    border: none;
    background: transparent;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .tabs button.active { background: #eef0ff; color: #3d4cff; font-weight: 600; }
  main { flex: 1; overflow: auto; position: relative; }
  #preview { width: 100%; height: 100%; border: none; background: #f5f5f5; }
  #source {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 12px;
    border: none;
    resize: none;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    white-space: pre;
    background: #1e1e1e;
    color: #d4d4d4;
  }
  .hidden { display: none !important; }
  footer {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid #e6e6e6;
  }
  footer button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }
  .primary { background: #3d4cff; color: #fff; }
  .secondary { background: #eef0f2; color: #1a1a1a; }
  #status {
    padding: 8px 12px;
    color: #b00020;
    background: #fff4f4;
    font-size: 12px;
  }
</style>

<header>
  <strong>Figmail</strong>
  <div class="tabs">
    <button id="tab-preview" class="active">Preview</button>
    <button id="tab-source">HTML</button>
  </div>
</header>

<div id="status" class="hidden"></div>

<main>
  <iframe id="preview"></iframe>
  <textarea id="source" class="hidden" readonly></textarea>
</main>

<footer>
  <button id="copy" class="secondary">Copy HTML</button>
  <button id="download" class="primary">Export (.zip)</button>
</footer>

<script>/*__INLINE_JS__*/</script>
